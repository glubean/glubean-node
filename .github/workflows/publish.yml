name: Publish to npm

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile
      - run: pnpm -r build
      - run: pnpm -r test

      # Publish packages in dependency order
      # pnpm publish converts workspace:* to real versions automatically
      # Core packages (versions aligned)
      - name: Publish @glubean/sdk
        continue-on-error: true
        run: pnpm --filter @glubean/sdk publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @glubean/scanner
        continue-on-error: true
        run: pnpm --filter @glubean/scanner publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @glubean/redaction
        continue-on-error: true
        run: pnpm --filter @glubean/redaction publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @glubean/runner
        continue-on-error: true
        run: pnpm --filter @glubean/runner publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @glubean/cli
        continue-on-error: true
        run: pnpm --filter @glubean/cli publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Short-name wrapper (depends on @glubean/cli)
      - name: Publish glubean
        continue-on-error: true
        run: pnpm --filter glubean publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Plugin packages (versioned independently)
      - name: Publish @glubean/auth
        continue-on-error: true
        run: pnpm --filter @glubean/auth publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @glubean/browser
        continue-on-error: true
        run: pnpm --filter @glubean/browser publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @glubean/graphql
        continue-on-error: true
        run: pnpm --filter @glubean/graphql publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @glubean/mcp
        continue-on-error: true
        run: pnpm --filter @glubean/mcp publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @glubean/grpc
        continue-on-error: true
        run: pnpm --filter @glubean/grpc publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
